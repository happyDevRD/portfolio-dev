<section class="services-section" appReveal>
    <div class="services-container">
        <div class="section-header">
            <div class="section-badge">Servicios</div>
            <h2>¿En qué puedo <span class="gradient-text">ayudarte?</span></h2>
            <p>Desde una API nueva hasta modernizar lo que ya tienes: diseño, implementación y acompañamiento con código limpio.</p>
        </div>

        <div class="api-error-banner" *ngIf="servicesError" role="alert">
            <i class="fas fa-plug" aria-hidden="true"></i>
            <span>No se pudieron cargar los servicios. Revisa la conexión o inténtalo más tarde.</span>
        </div>

        <!-- Skeleton loader -->
        <div class="services-grid" *ngIf="isLoading" aria-busy="true" aria-label="Cargando servicios">
            <div class="service-card skeleton-card" *ngFor="let i of [1,2,3,4]">
                <div class="service-header">
                    <app-skeleton width="44px" height="44px" radius="50%"></app-skeleton>
                    <app-skeleton width="60%" height="1.1rem" radius="4px"></app-skeleton>
                </div>
                <app-skeleton width="100%" height="0.85rem" radius="4px"></app-skeleton>
                <app-skeleton width="80%" height="0.85rem" radius="4px"></app-skeleton>
            </div>
        </div>

        <div class="services-grid" *ngIf="!isLoading && !servicesError">
            <div class="service-card" *ngFor="let service of services$ | async; let i = index"
                [style.--delay]="(i * 0.1) + 's'">
                <div class="service-header">
                    <div class="icon-circle">
                        <i [class]="getIcon(service.iconUrl)" aria-hidden="true"></i>
                    </div>
                    <h3>{{ service.title }}</h3>
                </div>
                <p>{{ service.description }}</p>
                <div class="card-arrow" aria-hidden="true">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </div>
        </div>
    </div>
</section>
