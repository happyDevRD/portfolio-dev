<section class="services-section">
    <h2>Mis Servicios</h2>
    <div class="services-grid">
        <div class="service-card" *ngFor="let service of services$ | async">
            <div class="icon-circle">
                <i [class]="getIcon(service.iconUrl)"></i>
            </div>
            <h3>{{ service.title }}</h3>
            <p>{{ service.description }}</p>
        </div>
    </div>
</section>
