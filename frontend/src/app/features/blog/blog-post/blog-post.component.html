<div class="page-scroll-wrapper">
<article class="post-container" *ngIf="article$ | async as article">
    <header class="post-header">
        <a routerLink="/blog" class="back-link">
            <i class="fas fa-arrow-left" aria-hidden="true"></i> Volver al Blog
        </a>
        <div class="tags">
            <span *ngFor="let tag of article.tags">#{{ tag }}</span>
        </div>
        <h1>{{ article.title }}</h1>
        <div class="meta">
            <span><i class="far fa-calendar-alt" aria-hidden="true"></i> {{ article.publishedAt | date:'longDate' }}</span>
            <span class="dot">·</span>
            <span><i class="far fa-clock" aria-hidden="true"></i>
                {{ article.readingTimeMinutes || calcReadingTime(article.content) }} min de lectura
            </span>
        </div>
    </header>

    <!-- Tabla de contenidos -->
    <nav class="toc" *ngIf="toc.length > 1" aria-label="Tabla de contenidos">
        <div class="toc-title">
            <i class="fas fa-list-ul" aria-hidden="true"></i>
            Contenido
        </div>
        <ol class="toc-list">
            <li *ngFor="let entry of toc"
                [class.toc-h2]="entry.level === 2"
                [class.toc-h3]="entry.level === 3"
                [class.active]="activeHeading === entry.id">
                <button (click)="scrollToHeading(entry.id)" class="toc-btn">{{ entry.text }}</button>
            </li>
        </ol>
    </nav>

    <div class="post-content">
        <p class="summary">{{ article.summary }}</p>
        <hr>
        <div class="markdown-body" #markdownContainer>
            <markdown [data]="article.content"></markdown>
        </div>
    </div>

    <footer class="post-footer">
        <span class="share-label">Compartir artículo:</span>
        <div class="share-buttons">
            <a [href]="getTwitterShareUrl(article.title)" target="_blank" rel="noopener" class="share-btn twitter" title="Compartir en X (Twitter)">
                <i class="fab fa-x-twitter" aria-hidden="true"></i> X
            </a>
            <a [href]="getLinkedInShareUrl()" target="_blank" rel="noopener" class="share-btn linkedin" title="Compartir en LinkedIn">
                <i class="fab fa-linkedin-in" aria-hidden="true"></i> LinkedIn
            </a>
            <button class="share-btn copy" (click)="copyLink()" title="Copiar enlace">
                <i class="fas fa-link" aria-hidden="true"></i>
                {{ linkCopied ? '¡Copiado!' : 'Copiar enlace' }}
            </button>
        </div>
    </footer>
</article>
</div>
