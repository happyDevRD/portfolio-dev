<div class="project-card">
    <div class="card-image" *ngIf="project.imageUrl">
        <img [src]="project.imageUrl" [alt]="project.title" loading="lazy">
        <!-- Badge con primer tag -->
        <span class="tech-badge" *ngIf="project.tags && project.tags.length > 0">
            {{ project.tags[0] }}
        </span>
    </div>
    <div class="card-content">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        <div class="dates">
            <span>{{ project.startDate | date:'MMM y' }}</span>
            <span class="sep">—</span>
            <span>{{ project.endDate ? (project.endDate | date:'MMM y') : 'Presente' }}</span>
        </div>
        <div class="tags" *ngIf="project.tags && project.tags.length > 0">
            <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
        </div>
        <div class="card-actions">
            <a [routerLink]="['/projects', project.id]" class="btn secondary-btn">
                <i class="fas fa-book-open" aria-hidden="true"></i> Caso de Estudio
            </a>
            <a *ngIf="project.projectUrl"
               [href]="project.projectUrl" target="_blank" rel="noopener" class="btn primary-btn"
               title="Ver demo en vivo">
                <i class="fas fa-external-link-alt" aria-hidden="true"></i> Ver en Vivo
            </a>
            <a *ngIf="project.githubUrl && !project.projectUrl"
               [href]="project.githubUrl" target="_blank" rel="noopener" class="btn primary-btn"
               title="Ver código en GitHub">
                <i class="fab fa-github" aria-hidden="true"></i> GitHub
            </a>
        </div>
    </div>
</div>
