<div class="project-card">
    <div class="card-image" *ngIf="project.imageUrl">
        <img [src]="project.imageUrl" [alt]="project.title">
    </div>
    <div class="card-content">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        <div class="dates">
            <span>{{ project.startDate | date }}</span> -
            <span>{{ project.endDate ? (project.endDate | date) : 'Present' }}</span>
        </div>
        <a *ngIf="project.projectUrl" [href]="project.projectUrl" target="_blank" class="btn">View Project</a>
    </div>
</div>
