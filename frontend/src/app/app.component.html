<!-- Top Navbar (Restored & Enhanced) -->
<header class="header">
  <nav class="navbar">
    <div class="logo">
      <span class="symbol">&lt;/&gt;</span> Eleazar Garcia
    </div>

    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a></li>
      <li><a routerLink="/projects" routerLinkActive="active">Proyectos</a></li>
      <li><a routerLink="/blog" routerLinkActive="active">Blog</a></li>
      <li><a routerLink="/resume" routerLinkActive="active">Currículum</a></li>
      <li><a routerLink="/contact" routerLinkActive="active">Contacto</a></li>
    </ul>

  </nav>
</header>

<!-- Main Content with Animation -->
<main class="main-content" [@routeAnimations]="o && o.isActivated ? o.activatedRouteData['animation'] : -1">
  <router-outlet #o="outlet"></router-outlet>
</main>

<app-footer></app-footer>
