<a class="skip-link" href="#main-content">Saltar al contenido</a>

<!-- Navbar — posición fixed, siempre visible -->
<header class="header" [class.scrolled]="isScrolled">
  <nav class="navbar">
    <a routerLink="/" class="logo" aria-label="Eleazar Garcia, ir al inicio">
      <span class="symbol" aria-hidden="true">&lt;/&gt;</span>
      <span class="logo-name-full">Eleazar Garcia</span>
      <span class="logo-name-short">E. García</span>
    </a>

    <ul class="nav-links" [class.open]="isMobileMenuOpen">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" appPrefetch="home" (click)="isMobileMenuOpen=false">Inicio</a></li>
      <li><a routerLink="/projects" routerLinkActive="active" appPrefetch="projects" (click)="isMobileMenuOpen=false">Proyectos</a></li>
      <li><a routerLink="/blog" routerLinkActive="active" appPrefetch="blog" (click)="isMobileMenuOpen=false">Blog</a></li>
      <li><a routerLink="/resume" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" appPrefetch="resume" (click)="isMobileMenuOpen=false">Currículum</a></li>
      <li><a routerLink="/contact" routerLinkActive="active" appPrefetch="contact" title="Contacto y agenda" (click)="isMobileMenuOpen=false">Contacto</a></li>
    </ul>

    <div class="controls">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="isDarkMode ? 'Modo claro' : 'Modo oscuro'">
        <i [class]="isDarkMode ? 'fas fa-sun' : 'fas fa-moon'"></i>
      </button>
      <button class="hamburger" (click)="toggleMobileMenu()" [class.open]="isMobileMenuOpen" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
</header>

<!-- Main Content — ocupa el espacio entre nav y footer -->
<main id="main-content" class="main-content" tabindex="-1">
  <div class="route-anim-host" [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
  </div>
</main>

<!-- Footer — barra permanente fija en la parte inferior -->
<app-footer></app-footer>
