<!-- Top Navbar (Restored & Enhanced) -->
<header class="header">
  <nav class="navbar">
    <div class="logo">
      <span class="symbol">&lt;/&gt;</span> Eleazar Garcia
    </div>

    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ 'NAV_HOME' |
          translate }}</a></li>
      <li><a routerLink="/projects" routerLinkActive="active">{{ 'NAV_PROJECTS' | translate }}</a></li>
      <li><a routerLink="/blog" routerLinkActive="active">{{ 'NAV_BLOG' | translate }}</a></li>
      <li><a routerLink="/resume" routerLinkActive="active">{{ 'NAV_RESUME' | translate }}</a></li>
      <li><a routerLink="/contact" routerLinkActive="active">{{ 'NAV_CONTACT' | translate }}</a></li>
    </ul>

    <div class="controls">

      <!-- Theme Toggle removed for Unified Deep Nebula Theme -->
      <!-- <button class="theme-toggle" (click)="toggleTheme()" ... > </button> -->
    </div>
  </nav>
</header>

<!-- Main Content with Animation -->
<main class="main-content" [@routeAnimations]="o && o.isActivated ? o.activatedRouteData['animation'] : -1">
  <router-outlet #o="outlet"></router-outlet>
</main>

<app-footer></app-footer>
