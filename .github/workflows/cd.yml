name: CD — Deploy to Render

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

jobs:
  # Despliega el backend primero
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render Deploy (Backend)
        run: |
          curl -sf -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

  # Solo despliega el frontend una vez que el backend haya arrancado
  deploy-frontend:
    name: Deploy Frontend → Render
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render Deploy (Frontend)
        run: |
          curl -sf -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"
