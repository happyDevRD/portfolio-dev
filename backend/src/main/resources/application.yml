spring:
  application:
    name: portfolio-backend
  output:
    ansi:
      enabled: ALWAYS
logging:
  level:
    org.springframework.web: DEBUG
    com.portfolio: DEBUG
  datasource:
    url: jdbc:h2:mem:portfolio
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
