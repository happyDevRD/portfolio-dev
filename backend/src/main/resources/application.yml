spring:
  application:
    name: portfolio-backend
  datasource:
    # Perfiles:
    #   local    → application-local.yml (Postgres en localhost; ver docker-compose.yml o script scripts/)
    #   supabase → application-supabase.yml + SPRING_DATASOURCE_URL, USERNAME, PASSWORD en el entorno
    #   prod     → bloque --- más abajo; Cloud Run con variables de entorno
    # mvn spring-boot:run activa "local" (pom). Supabase: mvn ... -Dspring-boot.run.profiles=supabase + env.
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  output:
    ansi:
      enabled: ALWAYS

server:
  port: 8080

app:
  cors:
    allowed-origins: "*"
  error:
    expose-details: true
  security:
    require-api-key-for-writes: false
    admin-api-key: ${ADMIN_API_KEY:}
  contact:
    rate-limit-per-minute: 30
  meeting:
    rate-limit-per-minute: 30
    min-notice-hours: 2
    max-days-ahead: 28
    business-hour-start: 9
    business-hour-end: 18
    timezone: America/Santo_Domingo
  google:
    calendar:
      enabled: false
      application-name: portfolio-backend
      calendar-id: ${GOOGLE_CALENDAR_ID:primary}
      credentials-path: ${GOOGLE_CALENDAR_CREDENTIALS_PATH:}
      oauth2-client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

logging:
  level:
    org.springframework.web: WARN
    com.portfolio: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: prod
  output:
    ansi:
      enabled: NEVER

app:
  cors:
    # Orígenes separados por coma (con y sin www). Variable CORS_ALLOWED_ORIGINS puede sobrescribir.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://elgarcia.org,https://www.elgarcia.org}
  error:
    expose-details: false
  security:
    require-api-key-for-writes: true
    admin-api-key: ${ADMIN_API_KEY}
  contact:
    rate-limit-per-minute: 30
  meeting:
    rate-limit-per-minute: 30
    min-notice-hours: 2
    max-days-ahead: 28
    business-hour-start: 9
    business-hour-end: 18
    timezone: America/Santo_Domingo
  google:
    calendar:
      enabled: ${GOOGLE_CALENDAR_ENABLED:false}
      application-name: portfolio-backend
      calendar-id: ${GOOGLE_CALENDAR_ID:primary}
      credentials-path: ${GOOGLE_CALENDAR_CREDENTIALS_PATH:}
      oauth2-client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

logging:
  level:
    org.springframework.web: WARN
    com.portfolio: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
