spring:
  application:
    name: portfolio-backend
  datasource:
    url: jdbc:h2:mem:portfolio
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  output:
    ansi:
      enabled: ALWAYS

server:
  port: 8080

app:
  cors:
    allowed-origins: "*"
  error:
    expose-details: true
  security:
    require-api-key-for-writes: false
    admin-api-key: ${ADMIN_API_KEY:}
  contact:
    rate-limit-per-minute: 30

logging:
  level:
    org.springframework.web: WARN
    com.portfolio: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driverClassName: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: false
  output:
    ansi:
      enabled: NEVER

app:
  cors:
    # Orígenes separados por coma (con y sin www). Variable CORS_ALLOWED_ORIGINS puede sobrescribir.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://elgarcia.org,https://www.elgarcia.org}
  error:
    expose-details: false
  security:
    require-api-key-for-writes: true
    admin-api-key: ${ADMIN_API_KEY}
  contact:
    rate-limit-per-minute: 30

logging:
  level:
    org.springframework.web: WARN
    com.portfolio: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
