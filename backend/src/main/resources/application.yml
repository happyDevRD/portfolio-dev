spring:
  application:
    name: portfolio-backend
  datasource:
    url: jdbc:h2:mem:portfolio
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  output:
    ansi:
      enabled: ALWAYS

server:
  port: 8080

app:
  cors:
    allowed-origins: "*"

logging:
  level:
    org.springframework.web: WARN
    com.portfolio: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driverClassName: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false
  output:
    ansi:
      enabled: NEVER

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://portfolio-dev-1-592i.onrender.com}

logging:
  level:
    org.springframework.web: WARN
    com.portfolio: INFO
