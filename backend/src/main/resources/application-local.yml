# Perfil "local" — PostgreSQL en tu máquina (activado por defecto con mvn spring-boot:run).
#
# Si instalaste Postgres en Windows, la contraseña del usuario "postgres" suele ser la que elegiste en el instalador,
# no "postgres". Cámbiala abajo o define SPRING_DATASOURCE_PASSWORD en el entorno.
#
# Docker: .\scripts\start-local-postgres.ps1 o docker compose up -d (mismas credenciales por defecto).
#
# Supabase (sin local): mvn spring-boot:run "-Dspring-boot.run.profiles=supabase" y variables SPRING_DATASOURCE_*.
#
# Las variables SPRING_DATASOURCE_* tienen prioridad sobre lo de abajo.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres

# Google Calendar (ADC local: gcloud auth application-default login).
# Sin credenciales ADC, arranca con GOOGLE_CALENDAR_ENABLED=false o deja calendar desactivado en application.yml base.
# Workspace: si ves 403 al crear eventos, prueba GOOGLE_CALENDAR_ID con tu correo completo en lugar de "primary".
app:
  google:
    calendar:
      enabled: ${GOOGLE_CALENDAR_ENABLED:true}
      calendar-id: ${GOOGLE_CALENDAR_ID:primary}
      application-name: ${GOOGLE_CALENDAR_APP_NAME:portfolio-backend}
